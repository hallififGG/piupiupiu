<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Блок-Аркада: Idle Shooter + Автострельба</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="game-container">
    <div class="game-area">
        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
        </div>
        <div class="touch-panel" id="touchPanel">
            <button class="touch-btn" id="btnLeft" data-icon="◀"> <span>◀ ЛЕВО</span></button>
            <button class="touch-btn" id="btnRight" data-icon="▶"> <span>ПРАВО ▶</span></button>
            <button class="touch-btn" id="btnShoot" data-icon="⚡"> <span>ОГОНЬ ⚡</span></button>
        </div>
    </div>

    <div class="upgrade-panel">
        <div class="stats">
    <h3>🔫 ОЧКИ</h3>
    <div class="score-box" id="scoreDisplay">0</div>
    <div class="idle-box">⚡ <span id="idleIncome">0</span>/с</div>
    <div class="idle-tip">★ блоки + бонусы ★</div>
    <hr style="margin: 8px 0; border-color: #3b82f6;">
    <h3>🎯 УРОВЕНЬ</h3>
    <div class="level-box" id="levelDisplay" style="font-size:1.2rem; color:#ffaa44;">1</div>
    <div class="exp-box" id="expDisplay" style="font-size:0.8rem; color:#7ee0ff;">0 / 30</div>
</div>
        <div class="upgrade-list">
            <div class="upgrade-item">
                <div class="upgrade-info">
                    <span class="full-text">💥 Урон пули</span>
                    <span class="short-icon">💥</span>
                    <br><span class="upgrade-cost" id="dmgCost">50</span>
                </div>
                <button class="upgrade-buy" data-upgrade="damage">+1</button>
            </div>
            <div class="upgrade-item">
                <div class="upgrade-info">
                    <span class="full-text">🏹 Скорострельность</span>
                    <span class="short-icon">🏹</span>
                    <br><span class="upgrade-cost" id="rateCost">40</span>
                </div>
                <button class="upgrade-buy" data-upgrade="fireRate">+</button>
            </div>
            <div class="upgrade-item">
                <div class="upgrade-info">
                    <span class="full-text">📐 Ширина платформы</span>
                    <span class="short-icon">📐</span>
                    <br><span class="upgrade-cost" id="widthCost">60</span>
                </div>
                <button class="upgrade-buy" data-upgrade="platformWidth">+20</button>
            </div>
            <div class="upgrade-item">
                <div class="upgrade-info">
                    <span class="full-text">💰 Пассивный доход</span>
                    <span class="short-icon">💰</span>
                    <br><span class="upgrade-cost" id="passiveCost">80</span>
                </div>
                <button class="upgrade-buy" data-upgrade="passiveIncome">+1</button>
            </div>
            <div class="upgrade-item">
                <div class="upgrade-info">
                    <span class="full-text">🤖 Автовыстрел (ур. <span id="autoLevel">0</span>)</span>
                    <span class="short-icon">🤖</span>
                    <br><span class="upgrade-cost" id="autoCost">100</span>
                </div>
                <button class="upgrade-buy" data-upgrade="autoShoot">+1 ур.</button>
            </div>
        </div>
    </div>
</div>

<!-- Подключаем классы в правильном порядке (сначала маленькие сущности, потом большие) -->
<script src="js/Player.js"></script>
<script src="js/Bullet.js"></script>
<script src="js/Enemy.js"></script>
<script src="js/ExperienceGem.js"></script>
<script src="js/LevelUpSystem.js"></script>
<script src="js/AutoShooter.js"></script>
<script src="js/ArcadeShooter.js"></script>
<script src="js/main.js"></script>
</body>
</html>
